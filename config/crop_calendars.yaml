# Crop Calendar Configuration
# Used by Risk Engine agent for event detection timing
# Calibrated to WA wheatbelt conditions — source: DPIRD 2026 WA Crop Sowing Guide
# (docs/DPIRD-2026-WA-Crop-Sowing-Guide.pdf) + SILO climate data

# Wheat growing stages and typical timing
wheat:
  # Stage definitions with month ranges (approximate)
  stages:
    planting:
      months: [4, 5, 6]        # Apr-Jun (Autumn planting)
      description: "Seeding and early establishment"
      
    emergence:
      months: [5, 6, 7]        # May-Jul  
      description: "Crop emergence, vulnerable to frost"
      frost_critical: true
      
    tillering:
      months: [6, 7, 8]        # Jun-Aug
      description: "Plant development, some frost tolerance"
      frost_critical: true
      
    stem_elongation:
      months: [8, 9]           # Aug-Sep
      description: "Rapid growth, frost risk returns"
      frost_critical: true
      
    flowering:
      months: [9, 10]          # Sep-Oct  
      description: "Most frost-sensitive stage"
      frost_critical: true
      heat_critical: false
      
    grain_fill:
      months: [10, 11]         # Oct-Nov
      description: "Heat stress can reduce grain size/quality" 
      frost_critical: true
      heat_critical: true
      
    maturity:
      months: [11, 12]         # Nov-Dec
      description: "Crop ready for harvest"
      frost_critical: false
      heat_critical: false
      
    seeding:
      months: [4, 5, 6]        # Apr-Jun (Autumn break and germination)
      description: "Autumn break and germination moisture"
      rain_critical: true
      rainfall_role: beneficial

    crop_development:
      months: [7, 8, 9, 10]    # Jul-Oct (Vegetative and reproductive)
      description: "Vegetative and reproductive stage moisture"
      rain_critical: true
      rainfall_role: beneficial

    harvest:
      months: [11, 12, 1]      # Nov-Jan (extends into summer)
      description: "Rainfall risk for quality downgrades"
      rain_critical: true

# Regional variations (simplified for MVP)
regions:
  # Statistical Division level adjustments
  # Format: SD_code: {stage_adjustments}
  
  default:
    # Default calendar used if no specific regional data
    calendar: "wheat"
    
  # Example regional adjustments (implement as needed)
  # "WA_Central_Wheat":
  #   calendar: "wheat"
  #   adjustments:
  #     planting: [4, 5]      # Earlier planting in WA
  #     harvest: [11, 12]     # Earlier harvest
      
  # "SA_Mallee": 
  #   calendar: "wheat"
  #   adjustments:
  #     grain_fill: [10, 11, 12]  # Extended grain fill

# Crop mix weights by region (for severity scoring)
# TODO M2: Import actual crop statistics
crop_mix:
  default:
    wheat: 0.8
    barley: 0.15  
    other: 0.05
    
# Critical temperature thresholds by stage
thresholds:
  frost:
    # Temperature thresholds (°C) by crop stage
    emergence:
      light: 2.0      # 0-2°C: Light damage
      moderate: 0.0   # -2-0°C: Moderate damage  
      severe: -2.0    # <-2°C: Severe damage
      
    flowering:
      light: 1.0      # More sensitive during flowering
      moderate: -1.0
      severe: -3.0
      
    grain_fill:
      light: 0.0      # Critical stage
      moderate: -2.0
      severe: -4.0
      
  heat:
    grain_fill:
      stress: 32.0    # >32°C: Heat stress begins
      severe: 35.0    # >35°C: Severe impact on grain quality
      
  rainfall:
    seeding:
      germination_trigger: 10.0   # mm — minimum single event to trigger germination (CSV engine only)
      adequate_break: 25.0        # mm over 7 days — sufficient autumn break (CSV engine only)
      marginal_break_mm_7d: 15.0  # mm over 7 days — lower bound of marginal band (CSV engine only)
      marginal_low_break_mm_7d: 10.0  # mm over 7 days — lower bound of marginal_low band (CSV engine only)
      inadequate_week: 5.0        # mm over 7 days — flag dry spell during seeding (CSV engine only)

    crop_development:
      dry_spell_7day: 5.0         # mm — flag if <5mm over 7 days
      dry_spell_14day: 10.0       # mm — moderate stress if <10mm over 14 days
      adequate_monthly: 25.0      # mm — benchmark for adequate growing-season rain

    harvest:
      moderate: 10.0   # >10mm in single day
      high: 15.0       # >15mm over 3 days
      severe: 25.0     # >25mm over 3 days

# Per-crop seeding window definitions (used by DuckDB-backed risk engine)
# Each crop has its own active months and 7-day moisture thresholds
seeding_crops:
  canola:
    months: [3, 4]                   # Mar–Apr: early seeder, surface moisture sensitive
    adequate_break_mm_7d: 15.0       # Canola needs moist seedbed — lower adequate threshold
    marginal_break_mm_7d: 10.0
    marginal_low_break_mm_7d: 7.0
    description: "Canola autumn break — surface moisture critical, dry seeding trending earlier (DPIRD 2026)"

  wheat_barley:
    months: [4, 5]                   # Apr–May: peak yield from late Apr–early May (DPIRD TOS trials, 2020–24)
                                     # Barley: mid-Apr to mid-May for main season; quick varieties to Jun in north
    adequate_break_mm_7d: 25.0       # Needs more for reliable germination post dry-sowing
    marginal_break_mm_7d: 15.0
    marginal_low_break_mm_7d: 10.0
    description: "Wheat/barley seeding — ANZAC Day dry sow pivot (late Apr–May optimal per DPIRD 2026)"

  lupins:
    months: [4, 5, 6]               # Late Apr–early Jun: DPIRD Table 9 (all agzones)
                                     # High-rainfall zones (Agzone 1,2,6): late Apr–early Jun
                                     # Low-medium zones (Agzone 3,4,5): late Apr–mid-May
    adequate_break_mm_7d: 20.0
    marginal_break_mm_7d: 12.0
    marginal_low_break_mm_7d: 8.0
    description: "Lupins — deep sowing option; sowing window late Apr–early Jun per DPIRD 2026 Table 9"

# Notes and assumptions
metadata:
  source: "DPIRD 2026 WA Crop Sowing Guide (Bulletin 4937, November 2025)"
  source_file: "docs/DPIRD-2026-WA-Crop-Sowing-Guide.pdf"
  assumptions:
    - "Calibrated to WA wheatbelt conditions (Agzones 1–6)"
    - "Wheat sowing window: peak yield late Apr–early May (DPIRD TOS trials, Mullewa/Merredin/Katanning/Grass Patch 2020–24)"
    - "Barley sowing: mid-Apr to mid-May for main season; quick varieties (e.g. Rocket CL) suit late May–Jun in northern wheatbelt"
    - "Canola sowing: trending earlier — dry seeding from Mar common; surface moisture critical"
    - "Lupin sowing: late Apr–early Jun per DPIRD Table 9 (Recommended sowing times by Agzone)"
    - "Stage timing approximate — varies by variety maturity class and year"
    - "Thresholds based on industry literature review"
    - "Regional Agzone variations not fully implemented — single WA wheatbelt calendar used"

  validation_needed:
    - "Validate stage month boundaries against station-level observed planting/harvest dates"
    - "Validate thresholds against known damage events in event_log.csv"
    - "Implement Agzone-specific stage adjustments (Agzones 1–6 defined by DPIRD)"
    - "Consider variety maturity class (quick vs mid-slow vs slow) in phenology windows"